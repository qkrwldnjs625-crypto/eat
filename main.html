<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연애 상담 AI 챗봇</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff1f2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 420px;
      height: 650px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.16);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #f43f5e;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .csv-area {
      padding: 12px;
      background: #fff7f8;
      border-bottom: 1px solid #fecdd3;
      font-size: 13px;
    }

    .csv-area input {
      margin-top: 8px;
      width: 100%;
    }

    .status {
      margin-top: 6px;
      color: #be123c;
      font-size: 12px;
    }

    .chat-box {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fffafa;
    }

    .message {
      max-width: 78%;
      padding: 11px 14px;
      margin-bottom: 12px;
      border-radius: 15px;
      line-height: 1.45;
      font-size: 14px;
      word-break: keep-all;
      white-space: pre-wrap;
    }

    .bot {
      background: #ffe4e6;
      color: #111827;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .user {
      background: #f43f5e;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .chat-input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #fecdd3;
      background: white;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border: 1px solid #fda4af;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
    }

    #sendBtn {
      margin-left: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #f43f5e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #sendBtn:hover {
      background: #e11d48;
    }

    .example-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid #fecdd3;
      background: #fff7f8;
    }

    .example-buttons button {
      border: 1px solid #fda4af;
      background: white;
      color: #be123c;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .example-buttons button:hover {
      background: #ffe4e6;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      연애 상담 AI 챗봇
    </div>

    <div class="csv-area">
      상담 데이터 CSV 파일을 불러오세요.
      <input type="file" id="csvFile" accept=".csv" />
      <div class="status" id="status">아직 CSV 파일이 불러와지지 않았습니다.</div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        안녕하세요. 저는 CSV 데이터를 바탕으로 답변하는 연애 상담 챗봇입니다.
        먼저 love_advice.csv 파일을 불러온 뒤, 고민을 입력해주세요.
      </div>
    </div>

    <div class="example-buttons">
      <button onclick="quickQuestion('짝사랑 상대가 나를 좋아하는지 모르겠어요')">짝사랑</button>
      <button onclick="quickQuestion('고백을 해도 될까요?')">고백</button>
      <button onclick="quickQuestion('연락이 늦어서 불안해요')">연락</button>
      <button onclick="quickQuestion('싸운 뒤 어떻게 화해해야 할까요?')">화해</button>
      <button onclick="quickQuestion('헤어지는 게 맞을까요?')">이별</button>
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="연애 고민을 입력하세요..." />
      <button id="sendBtn">전송</button>
    </div>
  </div>

  <script>
    const csvFile = document.getElementById("csvFile");
    const statusText = document.getElementById("status");
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    let adviceData = [];

    csvFile.addEventListener("change", function(event) {
      const file = event.target.files[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        const text = e.target.result;
        adviceData = parseCSV(text);

        if (adviceData.length > 0) {
          statusText.textContent = `CSV 파일 불러오기 완료: ${adviceData.length}개의 상담 데이터`;
          addMessage("상담 데이터가 준비되었습니다. 이제 연애 고민을 입력해보세요.", "bot");
        } else {
          statusText.textContent = "CSV 데이터를 읽지 못했습니다. 파일 형식을 확인해주세요.";
        }
      };

      reader.readAsText(file, "UTF-8");
    });

    function parseCSV(csvText) {
      const lines = csvText.trim().split(/\r?\n/);
      const result = [];

      // 첫 줄은 제목줄: question,keywords,answer
      for (let i = 1; i < lines.length; i++) {
        const row = splitCSVLine(lines[i]);

        if (row.length >= 3) {
          result.push({
            question: row[0].trim(),
            keywords: row[1].trim(),
            answer: row[2].trim()
          });
        }
      }

      return result;
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function addMessage(text, sender) {
      const message = document.createElement("div");
      message.classList.add("message", sender);
      message.textContent = text;
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getBestAnswer(input) {
      if (adviceData.length === 0) {
        return "아직 CSV 파일이 불러와지지 않았습니다. 먼저 love_advice.csv 파일을 선택해주세요.";
      }

      let bestScore = 0;
      let bestAnswer = null;

      const userText = normalizeText(input);

      adviceData.forEach(item => {
        let score = 0;

        const questionText = normalizeText(item.question);
        const keywordList = item.keywords.split(",").map(k => normalizeText(k));

        // 질문 문장이 직접 포함되면 높은 점수
        if (userText.includes(questionText) || questionText.includes(userText)) {
          score += 5;
        }

        // 키워드가 포함되면 점수 추가
        keywordList.forEach(keyword => {
          if (keyword && userText.includes(keyword)) {
            score += 3;
          }
        });

        // 글자 단위 유사도 점수
        score += getSimilarityScore(userText, questionText);

        if (score > bestScore) {
          bestScore = score;
          bestAnswer = item.answer;
        }
      });

      if (bestScore <= 1) {
        return "아직 이 고민에 딱 맞는 답변을 찾지 못했습니다. CSV 파일에 관련 질문과 답변을 추가하면 더 정확하게 답변할 수 있습니다.";
      }

      return bestAnswer;
    }

    function normalizeText(text) {
      return text
        .toLowerCase()
        .replace(/\s/g, "")
        .replace(/[!?.,~]/g, "");
    }

    function getSimilarityScore(a, b) {
      let score = 0;

      for (let char of a) {
        if (b.includes(char)) {
          score += 0.1;
        }
      }

      return score;
    }

    function sendMessage() {
      const text = userInput.value.trim();

      if (text === "") {
        return;
      }

      addMessage(text, "user");
      userInput.value = "";

      setTimeout(() => {
        const answer = getBestAnswer(text);
        addMessage(answer, "bot");
      }, 500);
    }

    function quickQuestion(text) {
      userInput.value = text;
      sendMessage();
    }

    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
